allowBuilds:
  '@swc/core': true
  edgedriver: false
  electron: true
  electron-winstaller: true
  geckodriver: false
blockExoticSubdeps: false
minimumReleaseAge: 60
minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
  - '@oxc-project/*'
  - '@oxlint/*'
  - oxlint
  - oxfmt
  - oxlint-tsgolint
  - vitest
  - '@vitest/*'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.22
  vite-plus: 'https://pkg.pr.new/voidzero-dev/vite-plus@1588'
nodeLinker: hoisted
onlyBuiltDependencies:
  - '@swc/core'
  - '@tailwindcss/oxide'
  - electron
  - electron-winstaller
  - unrs-resolver
overrides:
  vite: 'catalog:'
  '@voidzero-dev/vite-plus-core': 'https://pkg.pr.new/voidzero-dev/vite-plus/@voidzero-dev/vite-plus-core@5577b0154f33d1480a3c96347e94fa5d2094de2e'
  '@voidzero-dev/vite-plus-prompts': 'https://pkg.pr.new/voidzero-dev/vite-plus/@voidzero-dev/vite-plus-prompts@5577b0154f33d1480a3c96347e94fa5d2094de2e'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
